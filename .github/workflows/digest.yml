name: Daily Digest

on:
  schedule:
    # Run at 5:00 AM MST (12:00 UTC) every day
    - cron: "0 12 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: go build -o mordecai ./cmd/mordecai

      - name: Run Digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: ./mordecai --config config.example.yaml
