# Mordecai - Daily Digest Configuration
# Copy this file to config.yaml and customize it.

# Controls the order modules appear in the digest.
module_order: ["sports", "stocks", "news"]

modules:
  # News headlines from RSS feeds (no API key required)
  news:
    enabled: true
    max_items: 5  # default per source, can be overridden per source below
    sources:
      - name: "Hacker News"
        url: "https://hnrss.org/frontpage"
        # max_items: 10  # optional per-source override
      - name: "BBC World"
        url: "http://feeds.bbci.co.uk/news/world/rss.xml"

  # Sports scores and upcoming games (ESPN API)
  sports:
    enabled: true
    leagues:
      - name: "NFL"
        teams: ["Philadelphia Eagles"]
      - name: "NBA"
        teams: ["Philadelphia 76ers"]
      - name: "MLB"
        teams: ["Philadelphia Phillies"]
      - name: "NHL"
        teams: ["Philadelphia Flyers"]
      - name: "EPL"
        teams: ["Tottenham Hotspur"]

  # Stock prices (Yahoo Finance)
  stocks:
    enabled: true
    tickers: ["AAPL", "GOOGL", "MSFT", "SPY", "DDOG"]

  # Weather forecast (Phase 3 - not yet implemented)
  weather:
    enabled: false
    location: "Littleton, CO"

delivery:
  discord:
    enabled: true
    webhook_url: "${DISCORD_WEBHOOK_URL}"
